name: Publish to PyPI

# Triggers on a tag push of the form `v*` — e.g. `git tag v0.6.0 && git push --tags`.
# Uses PyPI Trusted Publishing (OIDC) so no API token is stored as a GitHub secret.
# One-time setup: pypi.org -> Account -> Publishing -> Add pending publisher
#   PyPI Project Name: semanticembed
#   Owner:             jmurray10
#   Repository:        semanticembed-sdk
#   Workflow name:     publish.yml
#   Environment:       pypi   (matches the `environment:` line below)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # allow manual run from the Actions tab

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Verify the tag matches the package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject.toml ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
