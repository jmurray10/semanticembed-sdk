name: Bug report
description: Report a bug in the SemanticEmbed SDK (parsers, client, live connectors, agent CLI).
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below.
        For algorithm/encoding/scoring questions, email jeffmurr@seas.upenn.edu — that
        runs server-side and isn't part of this repository.

  - type: input
    id: version
    attributes:
      label: SDK version
      description: Output of `python -c "import semanticembed; print(semanticembed.__version__)"`
      placeholder: "0.7.2"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which part of the SDK?
      options:
        - encode / aencode (HTTP client)
        - extract.from_* (deterministic parsers)
        - live.from_* (Dynatrace / Honeycomb / Datadog)
        - find_edges (LLM fallback)
        - dedupe_edges
        - semanticembed-agent / semanticembed-gemini-agent CLI
        - explain / ask
        - other
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Smallest snippet that triggers the bug. Please include the input edges or the path to the file you're parsing.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (with traceback)
      render: shell
    validations:
      required: true
